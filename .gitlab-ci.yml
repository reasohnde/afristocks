workflow:
  rules:
    - changes:
        - backend/**/*

stages:
  - test
  - docker
  - deploy

default:
  interruptible: true

test:backend:
  stage: test
  image: node:20
  rules:
    - changes:
        - backend/**/*
  script:
    - cd backend
    - npm ci
    - npm test --if-present

docker:build-push:backend:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  rules:
    - changes:
        - backend/**/*
  needs: ["test:backend"]
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" -f backend/Dockerfile backend
    - docker tag "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/backend:latest"
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"

deploy:prod:backend:
  stage: deploy
  image: alpine:3.20
  resource_group: production
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - stuck_or_timeout_failure
      - scheduler_failure
      - unknown_failure
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
  needs: ["docker:build-push:backend"]
  environment:
    name: production
  before_script:
    - apk add --no-cache openssh-client bash curl
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$REMOTE_USER@$REMOTE_HOST" "set -euo pipefail
        echo 'Docker login registry...'
        echo \"$CI_REGISTRY_PASSWORD\" | docker login -u \"$CI_REGISTRY_USER\" --password-stdin \"$CI_REGISTRY\"
        echo 'docker compose pull/up...'
        docker compose -f \"$COMPOSE_FILE\" -p \"$COMPOSE_PROJECT\" pull
        docker compose -f \"$COMPOSE_FILE\" -p \"$COMPOSE_PROJECT\" up -d
        docker image prune -f
        if [ -n \"${PM_PORT:-}\" ]; then
          echo 'Healthcheck HTTP...'
          curl -fsS \"http://127.0.0.1:${PM_PORT}/health\" || { docker compose -f \"$COMPOSE_FILE\" -p \"$COMPOSE_PROJECT\" logs --no-color --tail=200; exit 1; }
        else
          echo 'PM_PORT non défini, healthcheck HTTP ignoré'; docker ps
        fi
      "
