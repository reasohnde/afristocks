services:
  postgres:
    image: postgres:16
    container_name: afri-postgres
    environment:
      POSTGRES_USER: afristocks
      POSTGRES_PASSWORD: afristocks
      POSTGRES_DB: afristocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: afri-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
