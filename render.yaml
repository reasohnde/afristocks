schemaVersion: "1"

services:
  - type: web
    name: afristocks-backend
    env: node
    plan: free
    # Choisis la région Render la plus proche (ex: frankfurt, oregon, virginia)
    region: frankfurt
    rootDir: backend
    autoDeploy: true

    buildCommand: |
      npm ci
      npx prisma generate
      npx prisma migrate deploy
      npm run build

    startCommand: npm run start:prod
    healthCheckPath: /health

    envVars:
      # Environnement Node
      - key: NODE_ENV
        value: production

      # Base de données (Neon PostgreSQL). Renseigne ces valeurs dans Render > Environment.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # Auth / JWT
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: "7d"
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRE
        value: "30d"

      # CORS (URL frontend en production)
      - key: FRONTEND_URL
        sync: false

      # Cloudinary (optionnel)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Email (optionnel)
      - key: EMAIL_SERVICE
        value: sendgrid
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@afristocks.com

      # Redis (optionnel)
      - key: REDIS_URL
        sync: false

      # Sentry (optionnel)
      - key: SENTRY_DSN
        sync: false

      # Rate limiting
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

      # APIs externes (optionnel)
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false


