name: CI

# Vérifie automatiquement chaque push et chaque pull request :
# le backend doit toujours compiler ; le frontend est vérifié en mode
# informatif tant qu'il n'est pas nettoyé (Phase 2 de la feuille de route).

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  frontend:
    name: Frontend — lint & build (informatif)
    runs-on: ubuntu-latest
    # Non bloquant pour l'instant : le frontend sera fiabilisé en Phase 2,
    # après quoi on retirera cette ligne pour rendre le job obligatoire.
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
