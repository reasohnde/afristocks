image: node:20

default:
  before_script:
    - cd backend

variables:
  NODE_ENV: "production"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/backend/.npm"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - backend/.npm/
    - backend/node_modules/

stages:
  - install
  - build
  - test

install:
  stage: install
  script:
    - npm ci
    - npx prisma generate
  artifacts:
    expire_in: 1 week
    paths:
      - backend/node_modules/

build:
  stage: build
  needs: ["install"]
  script:
    - npm run build
  artifacts:
    expire_in: 1 week
    paths:
      - backend/dist/

test:
  stage: test
  needs: ["build"]
  script:
    - npm test -- --ci --watchAll=false || echo "No tests to run"
  allow_failure: true


