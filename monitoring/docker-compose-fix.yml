services:
  prometheus:
    image: prom/prometheus:latest
    container_name: afristocks_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: afristocks_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=KXrb2wTlH7JRpI3wsrzme0kYu
    ports:
      - "3001:3000"
    user: "0"
