<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Continent africain stylisé -->
  <path d="M260 50 Q200 80 180 140 Q170 200 200 260 Q240 300 280 300 Q320 300 340 260 Q360 200 340 140 Q320 80 260 50" 
        fill="url(#grad1)" opacity="0.2"/>
  
  <!-- Graphique de croissance -->
  <polyline points="100,300 150,280 200,250 250,220 300,180 350,140 400,100" 
            stroke="url(#grad2)" stroke-width="3" fill="none"/>
  
  <!-- Points de données -->
  <circle cx="150" cy="280" r="8" fill="#10B981"/>
  <circle cx="200" cy="250" r="8" fill="#10B981"/>
  <circle cx="250" cy="220" r="8" fill="#10B981"/>
  <circle cx="300" cy="180" r="8" fill="#10B981"/>
  <circle cx="350" cy="140" r="8" fill="#10B981"/>
  
  <!-- Icônes de startups -->
  <g transform="translate(180,150)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#FB923C" opacity="0.3"/>
    <path d="M10 20 L20 10 L30 20 L20 30 Z" fill="#FB923C"/>
  </g>
  
  <g transform="translate(280,120)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#10B981" opacity="0.3"/>
    <circle cx="20" cy="20" r="10" fill="#10B981"/>
  </g>
  
  <!-- Texte -->
  <text x="260" y="350" text-anchor="middle" fill="#ffffff" opacity="0.8" font-family="Arial" font-size="14">
    Croissance & Innovation
  </text>
</svg>