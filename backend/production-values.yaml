# production-values.yaml

replicaCount: 2

image:
  repository: 771237845610.dkr.ecr.eu-west-1.amazonaws.com/afristocks-backend
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: afristocks.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - afristocks.com
      secretName: afristocks-tls

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

envFromSecret: afristocks-secrets
