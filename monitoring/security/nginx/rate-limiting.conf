# security/nginx/rate-limiting.conf
# Configuration détaillée du rate limiting

server {
    listen 443 ssl http2;
    server_name votredomaine.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/votredomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votredomaine.com/privkey.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Rate limiting général
    limit_req zone=general burst=20 nodelay;
    limit_req zone=ddos burst=50 nodelay;

    # Bloquer les user-agents malveillants
    if ($http_user_agent ~* (scrapy|curl|wget|nikto|sqlmap|nmap|masscan|harvest|httrack|clshttp|archiver|loader|email|extract|grab|miner|suck|reaper|siphon|vampire|bot)) {
        return 403;
    }

    # Bloquer les méthodes HTTP non utilisées
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }

    # Protection contre les injections SQL basiques
    if ($args ~* "(union.*select)|(insert.*into)|(delete.*from)|(drop.*table)|(script.*>)|(alert\()") {
        return 403;
    }

    # Protection XSS basique
    if ($args ~* "(<|%3C).*script.*(>|%3E)") {
        return 403;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\.(git|svn|htaccess|htpasswd|env|config|yml|yaml|json)$ {
        deny all;
        return 404;
    }

    # Protection du endpoint de login
    location /api/auth/login {
        limit_req zone=login burst=2 nodelay;
        limit_req_status 429;
        
        # Fail2ban log pour tentatives de connexion
        access_log /var/log/nginx/login.log;
        
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API avec rate limiting
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        
        # CORS headers si nécessaire
        add_header Access-Control-Allow-Origin "https://votredomaine.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Max-Age "3600" always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin avec restriction IP
    location /api/admin {
        # Whitelist IPs
        allow 10.0.0.0/8;
        allow 192.168.1.0/24;
        allow 203.0.113.0/24; # Remplacer par vos IPs admin
        deny all;
        
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (sans rate limiting)
    location /health {
        access_log off;
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Métriques pour Prometheus
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 172.16.0.0/12; # Docker network
        deny all;
    }

    # Static files avec cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|doc|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Root location
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security headers pour HTML
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Error pages personnalisées
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /429.html {
        root /usr/share/nginx/html;
        internal;
        add_header Retry-After "60" always;
    }
}

# Redirection HTTP vers HTTPS
server {
    listen 80;
    server_name votredomaine.com www.votredomaine.com;
    return 301 https://$server_name$request_uri;
}